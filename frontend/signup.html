<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | AI Money Mentor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-locked">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <section class="auth-gate" aria-label="Sign Up">
      <article class="auth-card glass">
        <p class="card-label">Create Account</p>
        <h2>Sign Up for AI Money Mentor</h2>
        <p class="auth-copy">Set up your account to unlock personalized AI guidance, insights, and planning tools.</p>

        <form id="signup-form" class="auth-form">
          <label>
            Full Name
            <input id="signup-name" type="text" required />
          </label>
          <label>
            Email
            <input id="signup-email" type="email" required />
          </label>
          <label>
            Password
            <input id="signup-password" type="password" minlength="6" required />
          </label>
          <label>
            Confirm Password
            <input id="signup-confirm" type="password" minlength="6" required />
          </label>
          <button type="submit">Create Account</button>
        </form>

        <p class="auth-switch">Already have an account ? <a href="index.html" class="auth-link">Login</a></p>
        <p id="signup-message" class="auth-message" aria-live="polite"></p>
      </article>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="signup.js"></script>
  </body>
</html>
